<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KANHA</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>

  <!-- 👇 paste this right here, before </head> -->
  <script>
    const name = "KANHA";
    const suffix = " ✦";
    let i = 0, dir = 1;
    setInterval(() => {
      if (!document.hidden) {
        document.title = name.slice(0, i) + (i === name.length ? suffix : "_");
        i += dir;
        if (i > name.length) dir = -1;
        if (i < 0) { i = 0; dir = 1; }
      }
    }, 150);
  </script>

</head>
<body class="bg-[#0B0A13]">
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
